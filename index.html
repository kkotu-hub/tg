<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моя Игра</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        h1 { color: #0088cc; }
    </style>
</head>
<body>

    <h1>Привет в игре!</h1>
    <p>Твой ник: <span id="username">Загрузка...</span></p>

    <script>
        // Инициализируем WebApp
        const tg = window.Telegram.WebApp;

        // Принудительно расширяем приложение на все окно (на будущее пригодится)
        tg.expand();

        try {
            // Проверяем, есть ли вообще данные пользователя
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                const user = tg.initDataUnsafe.user;
                // Берем юзернейм, если его нет — имя, если и его нет — фамилию
                const nickname = user.username || user.first_name || user.last_name || "Инкогнито";
                document.getElementById('username').innerText = nickname;
            } else {
                document.getElementById('username').innerText = "Данные ТГ не найдены (открыто вне мессенджера)";
            }
        } catch (error) {
            document.getElementById('username').innerText = "Ошибка скрипта: " + error.message;
        }

        // Только теперь говорим Телеграму, что страница полностью отрисована
        tg.ready();
    </script>
</body>
</html>
