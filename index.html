<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mines Simulator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1a1c20;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .header {
            margin-bottom: 20px;
        }
        .balance-box {
            background: #2c2f36;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
            font-size: 18px;
            font-weight: bold;
            color: #00e676;
            border: 1px solid #3c404a;
        }
        .controls {
            margin: 20px 0;
        }
        select, button {
            background: #2c2f36;
            color: white;
            border: 1px solid #4f5361;
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 0 5px;
        }
        button:hover { background: #3a3f4b; }
        #btn-cashout {
            background: #00e676;
            color: #000;
            font-weight: bold;
            display: none;
        }
        #btn-cashout:hover { background: #00b359; }
        
        /* Сетка поля Мин */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-width: 320px;
            margin: 20px auto;
        }
        .cell {
            aspect-ratio: 1;
            background: #2c2f36;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            border: 1px solid #3c404a;
        }
        .cell:active { transform: scale(0.95); }
        .cell.open-gem { background: #00a3ff; box-shadow: inset 0 0 10px #0055ff; }
        .cell.open-mine { background: #ff3d00; box-shadow: inset 0 0 10px #b30000; }
        .cell.disabled { pointer-events: none; }
        
        .status {
            font-size: 16px;
            height: 20px;
            color: #b0b5c6;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h3 id="user-title">Привет, Игрок!</h3>
        <div class="balance-box">💰 <span id="balance">1000</span> фантиков</div>
    </div>

    <div class="controls">
        <label for="mine-count">Мин:</label>
        <select id="mine-count">
            <option value="3">3</option>
            <option value="5" selected>5</option>
            <option value="10">10</option>
            <option value="24">24</option>
        </select>
        <button id="btn-start" onclick="startGame()">Старт (Ставка 100)</button>
        <button id="btn-cashout" onclick="cashOut()">Забрать: +0</button>
    </div>

    <div class="grid" id="board"></div>
    <div class="status" id="status-text">Выберите количество мин и нажмите Старт</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Выводим имя из ТГ
        if (tg.initDataUnsafe?.user) {
            document.getElementById('user-title').innerText = "Игрок: " + (tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name);
        }

        // Локальный баланс (сохраняется на устройстве)
        let balance = parseInt(localStorage.getItem('mines_balance')) || 1000;
        let bet = 100;
        let minesCount = 5;
        let winMultiplier = 1;
        
        let boardData = []; // Карта мин (true - мина, false - алмаз)
        let openedCells = 0;
        let gameActive = false;

        document.getElementById('balance').innerText = balance;

        // Генерация поля 5x5
        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell disabled';
                cell.dataset.index = i;
                cell.onclick = () => clickCell(i);
                board.appendChild(cell);
            }
        }

        function startGame() {
            if (balance < bet) {
                alert("Недостаточно фантиков! Баланс обновлен до 1000.");
                balance = 1000;
                updateBalance(0);
            }

            gameActive = true;
            openedCells = 0;
            minesCount = parseInt(document.getElementById('mine-count').value);
            
            updateBalance(-bet);
            
            // Генерируем мины
            boardData = new Array(25).fill(false);
            let placedMines = 0;
            while (placedMines < minesCount) {
                let randIndex = Math.floor(Math.random() * 25);
                if (!boardData[randIndex]) {
                    boardData[randIndex] = true;
                    placedMines++;
                }
            }

            // Активируем ячейки визуально
            const cells = document.getElementsByClassName('cell');
            for (let cell of cells) {
                cell.className = 'cell';
                cell.innerText = '❓';
            }

            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('mine-count').disabled = true;
            document.getElementById('btn-cashout').style.display = 'inline-block';
            updateCashoutButton();
            document.getElementById('status-text').innerText = "Игра началась! Ищите алмазы.";
        }

        function clickCell(index) {
            if (!gameActive) return;
            const cells = document.getElementsByClassName('cell');
            const cell = cells[index];
            
            if (cell.classList.contains('open-gem') || cell.classList.contains('open-mine')) return;

            if (boardData[index]) {
                // ВЗРЫВ! Попал на мину
                cell.className = 'cell open-mine';
                cell.innerText = '💥';
                gameOver(false);
            } else {
                // Нашел алмаз
                cell.className = 'cell open-gem';
                cell.innerText = '💎';
                openedCells++;
                
                // Рассчитываем множитель (упрощенная казиношная формула)
                // Коэффициент растет от количества успешно открытых ячеек
                let safeCells = 25 - minesCount;
                winMultiplier = (25 / (25 - openedCells)) * (minesCount * 0.2 + 1);
                
                updateCashoutButton();
                document.getElementById('status-text').innerText = `Алмазов найдено: ${openedCells}`;

                if (openedCells === safeCells) {
                    gameOver(true); // Открыл все чистые ячейки
                }
            }
        }

        function updateCashoutButton() {
            if (openedCells === 0) {
                document.getElementById('btn-cashout').innerText = `Забрать: +0`;
                document.getElementById('btn-cashout').style.opacity = '0.5';
                document.getElementById('btn-cashout').style.pointerEvents = 'none';
            } else {
                let currentWin = Math.floor(bet * winMultiplier);
                document.getElementById('btn-cashout').innerText = `Забрать: +${currentWin}`;
                document.getElementById('btn-cashout').style.opacity = '1';
                document.getElementById('btn-cashout').style.pointerEvents = 'auto';
            }
        }

        function cashOut() {
            if (!gameActive || openedCells === 0) return;
            let profit = Math.floor(bet * winMultiplier);
            updateBalance(profit);
            document.getElementById('status-text').innerText = `Вы забрали +${profit} фантиков!`;
            gameOver(true, false);
        }

        function gameOver(isWin, exploded = true) {
            gameActive = false;
            document.getElementById('btn-start').style.display = 'inline-block';
            document.getElementById('mine-count').disabled = false;
            document.getElementById('btn-cashout').style.display = 'none';

            // Показываем где были остальные мины
            const cells = document.getElementsByClassName('cell');
            for (let i = 0; i < 25; i++) {
                cells[i].classList.add('disabled');
                if (boardData[i]) {
                    if (!cells[i].classList.contains('open-mine')) {
                        cells[i].innerText = '💣';
                    }
                } else {
                    if (!cells[i].classList.contains('open-gem')) {
                        cells[i].innerText = '💎';
                        cells[i].style.opacity = '0.4';
                    }
                }
            }

            if (!isWin && exploded) {
                document.getElementById('status-text').innerText = "БАБАХ! Вы подорвались на мине 😢";
            }
        }

        function updateBalance(amount) {
            balance += amount;
            localStorage.setItem('mines_balance', balance);
            document.getElementById('balance').innerText = balance;
        }

        // Инициализация при загрузке
        createBoard();
    </script>
</body>
</html>
